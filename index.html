<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Map</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; overflow: hidden; }

    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }

    #ui {
      position: fixed; top: 12px; left: 12px;
      padding: 10px 14px;
      background: rgba(8,6,3,0.90);
      border: 1px solid rgba(180,140,60,0.45);
      border-radius: 6px;
      color: #cba870;
      font: 12px/1.7 Georgia, serif;
      pointer-events: none;
    }
    #ui h3 { font-size: 14px; color: #e8c87a; letter-spacing: 1.5px; margin-bottom: 2px; }

    #legend {
      position: fixed; top: 12px; right: 12px;
      padding: 12px 14px;
      background: rgba(8,6,3,0.92);
      border: 1px solid rgba(180,140,60,0.45);
      border-radius: 6px;
      color: #cba870;
      font: 11px/1.4 Georgia, serif;
      max-height: 92vh; overflow-y: auto;
      min-width: 150px;
      scrollbar-width: thin;
      scrollbar-color: rgba(180,140,60,0.4) transparent;
    }
    #legend::-webkit-scrollbar { width: 4px; }
    #legend::-webkit-scrollbar-thumb { background: rgba(180,140,60,0.4); border-radius: 2px; }
    #legend h3 { font-size: 12px; color: #e8c87a; text-align: center; letter-spacing: 1.5px; margin-bottom: 8px; text-transform: uppercase; }
    .legend-item { display: flex; align-items: center; gap: 7px; margin: 3px 0; }
    .legend-swatch { width: 16px; height: 13px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.15); flex-shrink: 0; }

    #tooltip {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      padding: 7px 16px;
      background: rgba(8,6,3,0.93);
      border: 1px solid rgba(180,140,60,0.5);
      border-radius: 6px;
      color: #cba870;
      font: 12px/1 Georgia, serif;
      white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity 0.12s;
      max-width: 88vw; overflow: hidden; text-overflow: ellipsis;
    }
    #tooltip.visible { opacity: 1; }
    #tooltip strong { color: #e8c87a; }
    #tooltip .boss-tag { color: #ffd700; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="ui">
    <h3>⚔ WORLD MAP</h3>
    <div>Zoom: <span id="zoomVal">1.00</span>×</div>
    <div>Scroll · Zoom</div>
    <div>Drag · Pan</div>
    <div>Click · Explore</div>
  </div>

  <div id="legend">
    <h3>Biomes</h3>
  </div>

  <div id="tooltip"></div>

  <script src="game.js"></script>
</body>
</html>
